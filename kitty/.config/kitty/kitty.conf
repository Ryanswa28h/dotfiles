# you can choose themes from $HOME/.config/kitty/kitty-themes/ oringinally: FantasqueSansM Nerd Font Mono Bold
include ./kitty-themes/00-Default.conf
#include current-theme.conf

font_family JetBrainsMono Nerd Font
font_size 12.0
bold_font auto
italic_font auto
bold_italic_font auto

background_opacity 0.7
background_blur 1
dynamic_background_opacity 1
confirm_os_window_close 0

# Animated cursor
cursor_trail 1

# change to x11 or wayland or leave auto
linux_display_server auto

scrollback_lines 2000
wheel_scroll_min_lines 1

enable_audio_bell no

window_padding_width 4
allow_remote_control yes
enable_open_actions no
# selection_foreground none
# selection_background none
# foreground #dddddd
# background #000000
# cursor #dddddd


# BEGIN_KITTY_THEME
# Adwaita dark
include current-theme.conf
# END_KITTY_THEME
