source = $HOME/.config/hypr/wallust/wallust-hyprland.conf
$Scripts = $HOME/.config/hypr/scripts

general {
    grace = 1
    fractional_scaling = 2
    immediate_render = true
    ignore_empty_input = true
}

background {
    monitor =
    # NOTE: use only 1 path
    path = $HOME/.config/hypr/wallpaper_effects/.wallpaper_current
    color = rgb(0,0,0)
    # Blur settings
    blur_size = 3
    blur_passes = 2
    noise = 0.0117
    contrast = 1.3000
    brightness = 0.8000
    vibrancy = 0.2100
    vibrancy_darkness = 0.0
}

# ==========================================
# TIME & DATE (TOP LEFT)
# ==========================================

label {
    monitor =
    text = cmd[update:1000] date +"%H:%M"
    color = $color13
    font_size = 120
    font_family = SF Pro Display Bold
    position = 100, -100
    halign = left
    valign = top
}

label {
    monitor =
    text = cmd[update:60000] date +"%A, %B %d"
    color = rgba(188, 185, 195, 0.95)
    font_size = 24
    font_family = SF Pro Display Medium
    position = 110, -280
    halign = left
    valign = top
}

# ==========================================
# AUTHENTICATION (CENTER)
# ==========================================

# USER
label {
    monitor =
    text =   $USER
    color = $color13
    font_size = 22
    font_family = Victor Mono Bold Oblique
    position = 0, 60
    halign = center
    valign = center
}

# INPUT FIELD
input-field {
    monitor =
    size = 350, 60
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = $color11
    inner_color = rgba(255, 255, 255, 0.1)
    capslock_color = rgb(255,255,255)
    font_color = $color13
    fade_on_empty = false
    font_family = Victor Mono Bold Oblique
    rounding = 18
    placeholder_text = <i><span foreground="##ffffff99">Enter Password</span></i>
    hide_input = false
    position = 0, -20
    halign = center
    valign = center
    fail_text = <i>$FAIL ($ATTEMPTS)</i>
    fail_transition = 200
}

# Keyboard Layout
label {
    monitor =
    text = $LAYOUT
    color = rgba(188, 185, 195, 0.95)
    font_size = 16
    font_family = Victor Mono Bold Oblique
    position = 0, 5
    halign = center
    valign = bottom
}

# ==========================================
# SYSTEM INFO (BOTTOM RIGHT)
# ==========================================

 label {
    monitor =
    text = cmd[update:3600000] [ -f "$HOME/.cache/.weather_cache" ] && cat "$HOME/.cache/.weather_cache"
    color = $color13
    font_size = 16
    font_family = Victor Mono Bold Oblique
    position = 50, 0
    halign = left
    valign = bottom
}


# Battery
 label {
    monitor =
    text = cmd[update:1000] echo "<b> "$($Scripts/Battery.sh)" </b>"
    color = $color13
    font_size = 16
    font_family = Victor Mono Bold Oblique
    position = 0, 30
    halign = right
    valign = bottom
} 

# Uptime
label {
    monitor =
    text = cmd[update:60000] echo "<b> "$(uptime -p || $Scripts/UptimeNixOS.sh)" </b>"
    color = $color13
    font_size = 16
    font_family = Victor Mono Bold Oblique
    position = 0, 5
    halign = right
    valign = bottom
}
