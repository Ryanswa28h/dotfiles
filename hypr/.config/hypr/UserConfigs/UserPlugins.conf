plugin {
    borders-plus-plus {
        add_borders = 1

        # you can add up to 9 borders
        col.border_1 = rgb(ababab)
        col.border_2 = rgb(000000)

        # -1 means "default" as in the one defined in general:border_size
        border_size_1 = 1
        border_size_2 = 1

        # makes outer edges match rounding of the parent. Turn on / off to better understand. Default = on.
        natural_rounding = yes
    }
    hyprbars {
        # example config
        bar_height = 25
        bar_color = rgb(212121)
        bar_buttons_alignment = left
        bar_button_padding = 5
        bar_padding = 20
        bar_blur = true

        # example buttons (R -> L)
        # hyprbars-button = color, size, on-click
        hyprbars-button = rgb(ff4040), 12,  , hyprctl dispatch killactive
        hyprbars-button = rgb(eeee11), 12,  , togglefloating 
        hyprbars-button = rgb(66ff66), 12,  , hyprctl dispatch fullscreen 1

        # cmd to run on double click of the bar
        on_double_click = hyprctl dispatch fullscreen 1
        inactive_button_color = rgb(505050)
    }
    hyprexpo {
        columns = 3
        gap_size = 5
        bg_col = rgb(111111)
        workspace_method = center current # [center/first] [workspace] e.g. first 1 or center m+1

        gesture_distance = 300 # how far is the "max" for the gesture
    }
    hyprtrails {
        color = rgba(ffffffff)
    }
    hyprscrolling {
        column_width = 0.7
        fullscreen_on_one_column = true
    }
}

# This will toggle HyprExpo when SUPER+g is pressed
bind = SUPER, g, hyprexpo:expo, toggle
