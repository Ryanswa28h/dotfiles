# # Decoration Settings
#
# # Hyprland Wiki Links
# # Animation - https://wiki.hyprland.org/Configuring/Animations/
# # Decoration - https://wiki.hyprland.org/Configuring/Variables/#decoration
#
# # Sourcing colors generated by wallust
# source = $HOME/.config/hypr/wallust/wallust-hyprland.conf
#
# general {
#   border_size = 2
#   gaps_in = 2
#   gaps_out = 4
#   
#   col.active_border = rgb(00d0ff)
#   col.inactive_border = rgb(00748f)
# }
#
# decoration {
#   rounding = 0
#          
#   active_opacity = 1.0
#   inactive_opacity = 0.9
#   fullscreen_opacity = 1.0
#
#   dim_inactive = true
#   dim_strength = 0.1
#   dim_special = 0.8
#
#   shadow {
#     enabled = true
#     range = 3
#     render_power = 1
#
#     color =  $color12
#     color_inactive = $color10
#   }
#
#
#   blur {
#     enabled = true	
#     size = 12
#     passes = 3
#     ignore_opacity = true
#     new_optimizations = true
#     special = true
#     popups = true
#   }
# }
#
# group {
#   col.border_active = $color15
#
# 	groupbar {
# 		col.active = $color0
#   }
# }

general {
    gaps_in = 10
    gaps_out = 20

    border_size = 1

    # https://wiki.hypr.land/Configuring/Variables/#variable-types for info about colors
    col.active_border = rgba(616161ff)
    col.inactive_border = rgba(292929ff)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = true

    # Please see https://wiki.hypr.land/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    # layout = dwindle
}

# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
    rounding = 20
    rounding_power = 10

    active_opacity = 0.9
    inactive_opacity = 0.875
    fullscreen_opacity = 1.0

    blur {
        enabled = true
        xray = false
        special = false
        new_optimizations = true
        size = 20
        passes = 3
        brightness = 1
        noise = 0.01
        contrast = 0.89
        ignore_opacity = true
        vibrancy = 0.5
        vibrancy_darkness = 0.5
        popups = true
        popups_ignorealpha = 0.6
        input_methods = true
        input_methods_ignorealpha = 0.8
    }

    shadow {
        enabled = true
        # ignore_window = true
        range = 15
        # offset = 0 2
        render_power = 3
        color = rgba(1a1b2699)
    }

    # Dim
    dim_inactive = true
    dim_strength = 0.05
    dim_special = 0.07}
}

# https://wiki.hypr.land/Configuring/Variables/#animations
animations {
    enabled = true
    # curves
    bezier = expressiveFastSpatial, 0.42, 1.67, 0.21, 0.90
    bezier = expressiveSlowSpatial, 0.39, 1.29, 0.35, 0.98
    bezier = expressiveDefaultSpatial, 0.38, 1.21, 0.22, 1.00
    bezier = emphasizedDecel, 0.05, 0.7, 0.1, 1
    bezier = emphasizedAccel, 0.3, 0, 0.8, 0.15
    bezier = standardDecel, 0, 0, 0, 1
    bezier = menu_decel, 0.1, 1, 0, 1
    bezier = menu_accel, 0.52, 0.03, 0.72, 0.08
    bezier = stall, 1, -0.1, 0.7, 0.85
    # windows
    animation = windowsIn, 1, 3, emphasizedDecel, popin 80%
    animation = fadeIn, 1, 3, emphasizedDecel
    animation = windowsOut, 1, 4, emphasizedDecel, popin 90%
    animation = fadeOut, 1, 3, emphasizedDecel
    animation = windowsMove, 1, 3, emphasizedDecel, slide
    animation = border, 1, 10, emphasizedDecel
    # layers
    animation = layersIn, 1, 2.7, emphasizedDecel, popin 93%
    animation = layersOut, 1, 2.4, menu_accel, popin 94%
    # animation = layersIn, 1, 2, default, slide
    # animation = layersOut, 1, 2, default, slide
    # fade
    animation = fadeLayersIn, 1, 0.5, menu_decel
    animation = fadeLayersOut, 1, 2.7, stall
    # workspaces
    animation = workspaces, 1, 5, menu_decel, slidefade 30%
    # animation = workspaces, 1, 5, menu_decel, slide
    ## specialWorkspace
    animation = specialWorkspaceIn, 1, 2.8, emphasizedDecel, slidevert
    animation = specialWorkspaceOut, 1, 1.2, emphasizedAccel, slidevert
}

# Ref https://wiki.hypr.land/Configuring/Workspace-Rules/
# "Smart gaps" / "No gaps when only"
# uncomment all if you wish to use that.
# workspace = w[tv1], gapsout:0, gapsin:0
# workspace = f[1], gapsout:0, gapsin:0
# windowrule = bordersize 0, floating:0, onworkspace:w[tv1]
# windowrule = rounding 0, floating:0, onworkspace:w[tv1]
# windowrule = bordersize 0, floating:0, onworkspace:f[1]
# windowrule = rounding 0, floating:0, onworkspace:f[1]

# See https://wiki.hypr.land/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

