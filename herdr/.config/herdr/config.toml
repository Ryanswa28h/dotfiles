# Skip first-run onboarding
onboarding = false

[terminal]
default_shell = "/bin/zsh"
shell_mode = "non_login"
new_cwd = "follow"

[theme]
name = "catppuccin-mocha"
# name = "nord"

[ui]
sidebar_width = 20
sidebar_collapsed_mode = "hidden"
show_agent_labels_on_pane_borders = true
prompt_new_tab_name = false

[ui.toast]
delivery = "herdr"

[ui.sound]
enabled = true

[experimental]
kitty_graphics = true

[session]
resume_agents_on_restore = true

scrollback = 1000000
pane_history = true

[keys]

# Prefix
prefix = "ctrl+space"

# Tabs
new_tab = "prefix+c"
next_tab = "prefix+n"
previous_tab = "prefix+p"

# Detach
detach = "prefix+q"

# Workspace picker
workspace_picker = "prefix+w"

# Goto
goto = "prefix+g"

# Splits
split_horizontal = "prefix+minus"
split_vertical = "prefix+backslash"

# Pane focus
focus_pane_left  = "prefix+h"
focus_pane_down  = "prefix+j"
focus_pane_up    = "prefix+k"
focus_pane_right = "prefix+l"

# Indexed jumps
switch_tab = "prefix+1..9"

# Switch agents
next_agent = "prefix+a"
previous_agent = "prefix+shift+a"

# Lazygit
[[keys.command]]
key = "prefix+G"
type = "pane"
command = "lazygit"
description = "Lazygit in a temporary shell"

# Floating shell (closest to tmux popup)
[[keys.command]]
key = "prefix+t"
type = "pane"
command = "/bin/zsh"
description = "Temporary shell"
